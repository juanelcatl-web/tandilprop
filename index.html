<!DOCTYPE html>
<html lang="es">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5719496512652584" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TandilProp | Mercado Inmobiliario 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body, html { margin: 0; padding: 0; min-height: 100%; width: 100%; background: #fff; font-family: 'Inter', sans-serif; }

        #landing-page { display: block; background: #fff; overflow-x: hidden; }
        .app-shell { 
            display: none; flex-direction: column; 
            height: 100vh; height: 100dvh; width: 100%; 
            position: fixed; top: 0; left: 0; z-index: 5000; background: white; 
        }

        header { height: 110px; border-bottom: 2px solid #f1f5f9; padding: 10px 15px; flex-shrink: 0; background: white; z-index: 6000; }
        .main-content { flex: 1; position: relative; overflow: hidden; background: #f8fafc; }
        #map { width: 100%; height: 100%; position: absolute; inset: 0; z-index: 1; }
        
        .view { position: absolute; inset: 0; background: white; z-index: 10; display: none; overflow-y: auto; }
        .view.active { display: block; }

        nav { height: 75px; border-top: 2px solid #f1f5f9; display: flex; background: white; flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); z-index: 6000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; font-size: 11px; font-weight: 800; cursor: pointer; }
        .nav-item.active { color: #4f46e5; }
        .nav-item span { font-size: 22px; margin-bottom: 2px; }

        .pin-casa { filter: hue-rotate(190deg) brightness(0.9); }
        .pin-depto { filter: hue-rotate(15deg) saturate(3); }
        .pin-terreno { filter: hue-rotate(80deg) brightness(0.8); }

        #btn-confirm {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 500; background: #4f46e5; color: white; padding: 12px 25px;
            border-radius: 15px; font-weight: 900; box-shadow: 0 10px 20px rgba(79, 70, 229, 0.4);
            display: none; border: 2px solid white; white-space: nowrap;
        }

        .leaflet-popup-content-wrapper { border-radius: 20px; padding: 5px; }
        .hero-section { background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1600&q=80'); background-size: cover; background-position: center; min-height: 70vh; display: flex; align-items: center; justify-content: center; text-align: center; color: white; }
    </style>
</head>
<body>

<div id="landing-page">
    <header class="flex justify-between items-center border-none h-20 shadow-sm px-6">
        <h1 class="text-2xl font-black text-indigo-600 italic tracking-tighter">TANDILPROP</h1>
        <button onclick="startApp()" class="bg-indigo-600 text-white px-6 py-2 rounded-full font-black text-xs uppercase shadow-lg">Mapa Interactivo</button>
    </header>

    <section class="hero-section px-6">
        <div class="max-w-3xl">
            <p class="text-emerald-400 font-black tracking-[0.3em] uppercase mb-4 text-sm">Real Estate Tandil 2026</p>
            <h2 class="text-5xl md:text-7xl font-black mb-8 leading-tight">Encuentra tu lugar en las sierras.</h2>
            <button onclick="startApp()" class="bg-white text-indigo-900 px-10 py-5 rounded-2xl font-black text-lg shadow-2xl hover:scale-105 transition-all uppercase">Explorar Ahora</button>
        </div>
    </section>

    <section class="py-16 px-6 max-w-6xl mx-auto">
        <div class="grid md:grid-cols-3 gap-6 mb-16 text-center">
            <div class="p-8 bg-slate-50 rounded-[2rem] border border-slate-100">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-2">Valor m² Promedio</p>
                <h3 class="text-3xl font-black text-indigo-600 uppercase">U$D 1.250</h3>
            </div>
            <div class="p-8 bg-slate-50 rounded-[2rem] border border-slate-100">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-2">Rentabilidad</p>
                <h3 class="text-3xl font-black text-emerald-600 uppercase">4.5% Anual</h3>
            </div>
            <div class="p-8 bg-slate-50 rounded-[2rem] border border-slate-100">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-2">Publicaciones</p>
                <h3 class="text-3xl font-black text-indigo-600 uppercase">Dueño Directo</h3>
            </div>
        </div>
    </section>

    <footer class="bg-slate-900 py-12 text-center">
        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">© 2026 TandilProp | PIN ADMINISTRADOR: 2026</p>
    </footer>
</div>

<div class="app-shell" id="main-app">
    <header>
        <div class="flex justify-between items-center mb-2">
            <h1 onclick="goBack()" class="text-xl font-black text-indigo-600 italic tracking-tighter cursor-pointer">TANDILPROP</h1>
            <span class="text-[9px] font-black bg-indigo-50 text-indigo-600 px-2 py-1 rounded-md uppercase tracking-widest">App Mode</span>
        </div>
        <div class="flex gap-2">
            <select id="f-type" onchange="loadData()" class="flex-1 p-2 bg-slate-50 border rounded-lg text-[10px] font-bold outline-none"><option value="todos">TIPO: TODOS</option><option value="casa">🏠 CASAS</option><option value="depto">🏢 DEPTOS</option><option value="terreno">🌳 TERRENOS</option></select>
            <select id="f-op" onchange="loadData()" class="flex-1 p-2 bg-indigo-50 text-indigo-600 border rounded-lg text-[10px] font-bold outline-none"><option value="todos">OPERACIÓN</option><option value="venta">VENTA</option><option value="alquiler">ALQUILER</option></select>
        </div>
    </header>

    <div class="main-content">
        <div id="v-map" class="view active" style="display: block;">
            <div id="map"></div>
            <button id="btn-confirm" onclick="openForm()">📍 PUBLICAR AQUÍ</button>
        </div>
        
        <div id="v-list" class="view bg-slate-50">
            <div id="l-container" class="p-4 grid grid-cols-1 gap-4"></div>
            <div class="h-24"></div>
        </div>

        <div id="v-form" class="view p-6 bg-white">
            <h2 class="text-2xl font-black mb-6 italic text-indigo-600 uppercase">Anunciar Propiedad</h2>
            <div class="space-y-4 pb-32">
                <input type="text" id="p-title" placeholder="Título (Ej: Casa 3 ambientes)" class="w-full p-4 bg-slate-100 rounded-xl font-bold outline-none">
                
                <div class="flex gap-2">
                    <select id="p-type" class="flex-1 p-4 bg-slate-100 rounded-xl font-bold outline-none"><option value="casa">Casa</option><option value="depto">Depto</option><option value="terreno">Terreno</option></select>
                    <select id="p-op" class="flex-1 p-4 bg-indigo-50 text-indigo-600 rounded-xl font-bold outline-none"><option value="venta">Venta</option><option value="alquiler">Alquiler</option></select>
                </div>

                <div class="relative">
                    <span class="absolute left-4 top-1 text-[8px] font-black text-indigo-400 uppercase">Ubicación Detectada</span>
                    <input type="text" id="p-address" placeholder="Cargando dirección..." class="w-full p-4 pt-6 bg-slate-50 border-2 border-indigo-100 rounded-xl font-bold text-slate-700 outline-none">
                </div>

                <input type="file" id="p-file" accept="image/*" class="w-full p-3 border-2 border-dashed rounded-xl text-xs font-bold">
                
                <div class="flex gap-2">
                    <input type="number" id="p-price" placeholder="U$D Precio" class="flex-1 p-4 bg-slate-100 rounded-xl font-bold outline-none">
                    <input type="text" id="p-wa" placeholder="WhatsApp (249...)" class="flex-1 p-4 bg-slate-100 rounded-xl font-bold outline-none">
                </div>

                <button onclick="saveProp()" id="btn-save" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black uppercase shadow-lg active:scale-95 transition-all">Confirmar Publicación</button>
                <button onclick="cancelAdd()" class="w-full py-4 text-slate-400 font-bold text-center">Volver al Mapa</button>
            </div>
        </div>
    </div>

    <nav>
        <div onclick="showView('map')" id="t-map" class="nav-item active"><span>🗺️</span>MAPA</div>
        <div onclick="showView('list')" id="t-list" class="nav-item"><span>📋</span>LISTA</div>
    </nav>
</div>

<script>
    // NAVEGACIÓN
    function startApp() {
        document.getElementById('landing-page').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        setTimeout(() => { map.invalidateSize(); }, 400);
    }

    function goBack() {
        document.getElementById('main-app').style.display = 'none';
        document.getElementById('landing-page').style.display = 'block';
    }

    function showView(v) {
        document.querySelectorAll('.view').forEach(e => { e.style.display = 'none'; e.classList.remove('active'); });
        document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
        const tv = document.getElementById('v-' + v);
        tv.style.display = 'block'; tv.classList.add('active');
        document.getElementById('t-' + v).classList.add('active');
        if(v === 'map') setTimeout(() => { map.invalidateSize(); }, 300);
        else document.getElementById('btn-confirm').style.display = 'none';
    }

    // FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyBUViSxd76R5Xc3h4obWtbkGEXADPH8qTw",
        authDomain: "tandilprop-56ec1.firebaseapp.com",
        projectId: "tandilprop-56ec1",
        databaseURL: "https://tandilprop-56ec1-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('tandil_vfinal_fix');

    // MAPA
    var map = L.map('map', {zoomControl: false, attributionControl: false}).setView([-37.3217, -59.1332], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var latC, lngC, tempM;

    map.on('click', function(e) {
        if (e.originalEvent.target.classList.contains('leaflet-marker-icon')) return;
        if(tempM) map.removeLayer(tempM);
        latC = e.latlng.lat; lngC = e.latlng.lng;
        tempM = L.marker([latC, lngC], {draggable: true}).addTo(map);
        document.getElementById('btn-confirm').style.display = 'block';

        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latC}&lon=${lngC}`)
            .then(r => r.json())
            .then(data => {
                const calle = data.address.road || "Dirección sin nombre";
                const altura = data.address.house_number || "";
                document.getElementById('p-address').value = calle + " " + altura;
            });
    });

    function openForm() { showView('form'); }
    function cancelAdd() { if(tempM) map.removeLayer(tempM); document.getElementById('btn-confirm').style.display = 'none'; showView('map'); }

    async function saveProp() {
        const btn = document.getElementById('btn-save');
        const fileInput = document.getElementById('p-file');
        const title = document.getElementById('p-title').value;
        const price = document.getElementById('p-price').value;
        const wa = document.getElementById('p-wa').value;
        const address = document.getElementById('p-address').value;
        if(!title || !price || !wa) return alert("Completa los campos obligatorios");
        
        btn.disabled = true; btn.innerText = "Subiendo...";
        let imgData = "https://images.unsplash.com/photo-1560518883-ce09059eeffa?w=500";
        
        const sendData = (finalImg) => {
            db.push({
                title, price, wa, address,
                type: document.getElementById('p-type').value,
                op: document.getElementById('p-op').value,
                img: finalImg, lat: latC, lng: lngC
            }).then(() => { alert("¡Publicado!"); location.reload(); });
        };

        if(fileInput.files[0]) {
            const reader = new FileReader();
            reader.readAsDataURL(fileInput.files[0]);
            reader.onload = () => sendData(reader.result);
        } else {
            sendData(imgData);
        }
    }

    function deleteProp(id) {
        const pin = prompt("PIN de administrador para borrar:");
        if (pin === "2026") {
            if (confirm("¿Eliminar definitivamente?")) {
                db.child(id).remove().then(() => alert("Eliminado correctamente."));
            }
        } else {
            alert("PIN incorrecto.");
        }
    }

    function loadData() {
        db.on('value', snap => {
            const data = snap.val();
            const tF = document.getElementById('f-type').value;
            const oF = document.getElementById('f-op').value;
            map.eachLayer(l => { if(l instanceof L.Marker && l !== tempM) map.removeLayer(l); });
            
            let html = "";
            if (data) {
                Object.keys(data).reverse().forEach(key => {
                    const p = data[key];
                    if(tF !== 'todos' && p.type !== tF) return;
                    if(oF !== 'todos' && p.op !== oF) return;

                    // MARCADOR CON POPUP
                    var m = L.marker([p.lat, p.lng]).addTo(map);
                    if(m.getElement()) m.getElement().classList.add('pin-' + p.type);
                    
                    const popupHTML = `
                        <div style="width:180px; font-family:'Inter', sans-serif;">
                            <img src="${p.img}" style="width:100%; height:100px; object-fit:cover; border-radius:12px; margin-bottom:8px;">
                            <p style="font-weight:900; font-size:14px; margin:0;">U$D ${p.price}</p>
                            <p style="font-size:10px; color:#64748b; font-weight:700; text-transform:uppercase; margin-bottom:8px;">${p.type} | ${p.op}</p>
                            <a href="https://wa.me/${p.wa.replace(/\D/g,'')}" target="_blank" 
                               style="display:block; background:#4f46e5; color:white; text-align:center; padding:10px; border-radius:10px; font-size:10px; font-weight:900; text-decoration:none; text-transform:uppercase;">
                               Contactar WhatsApp
                            </a>
                        </div>
                    `;
                    m.bindPopup(popupHTML, { closeButton: false, offset: L.point(0, -15) });
                    
                    // TARJETA DE LISTA
                    html += `
                    <div class="bg-white rounded-[2rem] p-4 shadow-sm border border-slate-100 relative">
                        <button onclick="deleteProp('${key}')" class="absolute top-6 right-6 bg-red-100 text-red-500 w-8 h-8 rounded-full flex items-center justify-center text-xs shadow-sm z-50">🗑️</button>
                        <img src="${p.img}" class="w-full h-44 object-cover rounded-[1.5rem] mb-3">
                        <h4 class="font-black text-slate-800 uppercase text-xs mb-1 truncate">${p.title}</h4>
                        <p class="text-[10px] text-slate-400 font-bold mb-2 uppercase">${p.address || ''}</p>
                        <p class="text-2xl font-black text-indigo-600 mb-3 tracking-tighter">U$D ${p.price} <span class="text-[10px] text-indigo-300 ml-1 italic">${p.op}</span></p>
                        <a href="https://wa.me/${p.wa.replace(/\D/g,'')}" target="_blank" class="block w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase text-[10px] shadow-xl text-center">WhatsApp Directo</a>
                    </div>`;
                });
            }
            document.getElementById('l-container').innerHTML = html || "<p class='text-center py-20 font-bold opacity-30 uppercase text-xs'>Sin anuncios activos</p>";
        });
    }
    loadData();
</script>
</body>
    </html>
